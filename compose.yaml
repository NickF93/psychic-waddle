name: portfolio-rag-assistant

services:
  api:
    build:
      context: .
    image: portfolio-rag-assistant:local
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CHAT_BACKEND: ${CHAT_BACKEND}
      CHAT_BASE_URL: ${CHAT_BASE_URL}
      CHAT_API_KEY: ${CHAT_API_KEY}
      CHAT_MODEL: ${CHAT_MODEL}
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K}
      RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    networks:
      - runtime
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  db:
    image: pgvector/pgvector:0.8.2-pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    networks:
      - runtime
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ollama:
    image: ollama/ollama
    profiles:
      - ollama
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - runtime

  llama-cpp-chat:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles:
      - llama-cpp
    command:
      - -m
      - ${LLAMA_CPP_CHAT_MODEL_PATH}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    volumes:
      - type: bind
        source: ${LLAMA_CPP_MODEL_DIR}
        target: /models
        read_only: true
    networks:
      - runtime

  llama-cpp-embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles:
      - llama-cpp
    command:
      - -m
      - ${LLAMA_CPP_EMBEDDING_MODEL_PATH}
      - --embedding
      - --pooling
      - ${LLAMA_CPP_EMBEDDING_POOLING:-mean}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    volumes:
      - type: bind
        source: ${LLAMA_CPP_MODEL_DIR}
        target: /models
        read_only: true
    networks:
      - runtime

networks:
  runtime:
    driver: bridge

volumes:
  postgres-data:
  ollama-models:
