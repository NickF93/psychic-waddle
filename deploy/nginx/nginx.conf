worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx-error.log crit;

events {
    worker_connections 1024;
}

http {
    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_body_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    map $http_origin $assistant_cors_origin {
        default "";
        "https://pigreco.xyz" $http_origin;
        "https://www.pigreco.xyz" $http_origin;
    }

    map $http_origin $assistant_origin_rejected {
        default 1;
        "" 0;
        "https://pigreco.xyz" 0;
        "https://www.pigreco.xyz" 0;
    }

    limit_req_zone $binary_remote_addr zone=assistant_chat:10m rate=20r/m;

    log_format assistant_redacted
        '$time_iso8601 method=$request_method path=$uri status=$status '
        'bytes=$body_bytes_sent request_time=$request_time '
        'origin="$assistant_cors_origin"';

    access_log /dev/stdout assistant_redacted;

    server {
        listen 80;
        server_name _;

        client_max_body_size 4k;
        proxy_connect_timeout 5s;
        proxy_send_timeout 90s;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
            access_log off;
        }

        location = /api/assistant/chat {
            if ($assistant_origin_rejected) {
                return 403;
            }

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $assistant_cors_origin always;
                add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "content-type" always;
                add_header Access-Control-Max-Age 600 always;
                add_header Vary "Origin" always;
                return 204;
            }

            if ($request_method != POST) {
                return 405;
            }

            limit_req zone=assistant_chat burst=40 nodelay;
            add_header Access-Control-Allow-Origin $assistant_cors_origin always;
            add_header Vary "Origin" always;
            proxy_pass http://api:8000/chat?;
        }

        location = /api/assistant/health {
            if ($assistant_origin_rejected) {
                return 403;
            }

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $assistant_cors_origin always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                add_header Access-Control-Allow-Headers "content-type" always;
                add_header Access-Control-Max-Age 600 always;
                add_header Vary "Origin" always;
                return 204;
            }

            if ($request_method != GET) {
                return 405;
            }

            add_header Access-Control-Allow-Origin $assistant_cors_origin always;
            add_header Vary "Origin" always;
            proxy_pass http://api:8000/health?;
        }

        location = /api/assistant/ready {
            if ($assistant_origin_rejected) {
                return 403;
            }

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $assistant_cors_origin always;
                add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
                add_header Access-Control-Allow-Headers "content-type" always;
                add_header Access-Control-Max-Age 600 always;
                add_header Vary "Origin" always;
                return 204;
            }

            if ($request_method != GET) {
                return 405;
            }

            add_header Access-Control-Allow-Origin $assistant_cors_origin always;
            add_header Vary "Origin" always;
            proxy_pass http://api:8000/ready?;
        }

        location / {
            return 404;
        }
    }
}
